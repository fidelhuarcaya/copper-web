<div class="p-card p-3">

    <div class="flex justify-content-end gap-3 mb-3">
        <p-button label="Nuevo" [rounded]="true" (click)="createUser()" icon="pi pi-plus" />
    </div>

    <p-table [value]="users" [tableStyle]="{'min-width': '100%'}">
        <ng-template pTemplate="header">
            <tr>
                <th>Nombres</th>
                <th>Apellidos</th>
                <th>Correo</th>
                <th>Tipo de usuario</th>
                <th>Fecha de creación</th>
                <th>Acciones</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-user>
            <tr>
                <td>{{ user.name }}</td>
                <td>{{ user.lastName }}</td>
                <td>{{ user.email }}</td>
                <td>{{ user.roles[0].description }}</td>
                <td>{{ user?.createdDate }}</td>
                <td>
                    <div class="flex justify-content-end gap-3">
                        <button pButton (click)="updateUser(user)" icon="pi pi-pencil" class="p-button-text"></button>
                    </div>
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>
